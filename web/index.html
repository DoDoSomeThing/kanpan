<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>kanpan 看盤</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0a0e1f; color: #d7dbe6;
    font: 14px/1.6 -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: #0d1226; border-bottom: 1px solid #2a3a66;
  }
  header h1 { font-size: 16px; color: #7aa2ff; margin: 0 12px 0 0; }
  header input {
    width: 110px; padding: 6px 10px; border-radius: 6px;
    border: 1px solid #3a4a7a; background: #141a33; color: #e6eaf5; font-size: 14px;
  }
  header select, header button {
    padding: 6px 10px; border-radius: 6px; border: 1px solid #3a4a7a;
    background: #141a33; color: #e6eaf5; cursor: pointer; font-size: 13px;
  }
  header button { background: #2a3a7a; font-weight: 700; }
  header button:hover { background: #3a4a9a; }
  header .hint { color: #6b7596; font-size: 12px; }
  main { display: flex; height: calc(100vh - 53px); }
  #chart { flex: 1; min-width: 0; }
  #chart > div { height: 100%; }
  aside {
    width: 320px; flex: 0 0 320px; overflow-y: auto;
    background: #0d1226; border-left: 3px solid #3a4a7a; padding: 12px 14px 30px;
    font-size: 13px;
  }
  aside::-webkit-scrollbar { width: 8px; }
  aside::-webkit-scrollbar-thumb { background: #2a3a66; border-radius: 4px; }
  .kp-hr { border-top: 1px solid #2a3a66; margin: 9px 0; }
  .kp-score {
    font-size: 17px; padding: 9px 11px; border-radius: 6px;
    background: rgba(40,50,90,.55); border-left: 3px solid #7aa2ff;
  }
  .kp-score b { font-size: 24px; }
  .good  { border-left-color: #5ff08c; } .good b  { color: #5ff08c; }
  .mid   { border-left-color: #f4b400; } .mid b   { color: #f4b400; }
  .weak  { border-left-color: #ff7a7a; } .weak b  { color: #ff7a7a; }
  .sec { color: #7aa2ff; font-weight: 700; margin: 5px 0 2px; }
  .row { display: flex; justify-content: space-between; gap: 8px; margin: 3px 0; }
  .row span:first-child { color: #8893ad; flex: 0 0 auto; }
  .row span:last-child { color: #e6eaf5; text-align: right; }
  .note { color: #6b7596; font-size: 11px; margin: 2px 0; }
  .comment { background: rgba(40,50,90,.4); border-radius: 5px; padding: 8px 10px; }
  .buy { color: #ff8a8a; } .sell { color: #6fd08c; }
  .live { color: #5ff08c; font-size: 11px; font-weight: 700; }
  .state { border: 1px solid #243358; border-radius: 8px; padding: 8px 10px; margin: 8px 0; background: rgba(26,34,60,.4); }
  .state .srow { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: #97a3c2; }
  .state .srow b { color: #e6eaf5; }
  .state .cks { display: flex; flex-wrap: wrap; gap: 5px 12px; margin-top: 7px; font-size: 11.5px; }
  .ck.on { color: #6fd08c; } .ck.off { color: #6b7596; }
  .pb { border: 1px solid #243358; border-radius: 7px; padding: 7px 10px; margin: 5px 0; background: rgba(20,26,52,.4); }
  .pb .pbn { font-weight: 700; font-size: 13px; }
  .pb .pbt { font-size: 11px; font-weight: 700; }
  .pb .pbc { color: #8a96b8; font-size: 11px; margin: 2px 0; }
  .pb .pbstat { color: #97a3c2; font-size: 11px; }
  .pb .pbm { color: #c8d0e6; font-size: 11px; margin-top: 2px; }
  .pb-no_edge .pbt { color: #ff8a8a; } .pb-ok .pbt { color: #6fd08c; }
  .pb-overfit .pbt, .pb-low_sample .pbt, .pb-unvalidated .pbt { color: #e8c000; }
  .static { color: #8893ad; font-size: 11px; }
  .err { color: #ff7a7a; }
  .foot { color: #6b7596; font-size: 11px; font-style: italic; margin-top: 8px; }
  /* L3 持倉風控卡（最上方，風控優先） */
  .pos { border-radius: 7px; padding: 9px 11px; margin-bottom: 10px;
         background: rgba(40,50,90,.5); border-left: 4px solid #7aa2ff; }
  .pos.g { border-left-color: #5ff08c; }
  .pos.y { border-left-color: #f4b400; }
  .pos.r { border-left-color: #ff5a5a; background: rgba(120,40,40,.4); }
  .pos-h { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .pos-m { color: #aeb8d4; font-size: 12px; margin: 2px 0; }
  .pos-x { color: #e6eaf5; }
  .pos-form { display: flex; gap: 6px; margin: 6px 0 4px; }
  .pos-form input { width: 50%; padding: 5px 8px; border-radius: 5px;
    border: 1px solid #3a4a7a; background: #141a33; color: #e6eaf5; font-size: 13px; }
  .pos-form button, .pos-act button { padding: 5px 12px; border-radius: 5px; border: 0;
    background: #2a3a9a; color: #fff; font-weight: 700; cursor: pointer; font-size: 13px; }
  .pos-form button:hover, .pos-act button:hover { background: #3a4abb; }
  .pos-act { margin-top: 6px; }
  .pos-act button { background: #7a3a3a; width: 100%; }
  .pos-act button:hover { background: #9a4a4a; }
</style>
</head>
<body>
<header>
  <h1>kanpan 看盤</h1>
  <input id="sid" placeholder="代號 如 2330" value="2330">
  <select id="mkt">
    <option value="TWSE">上市</option>
    <option value="TPEX">上櫃</option>
  </select>
  <button id="go">看盤</button>
  <span class="hint">K 線 = kanpan 自畫（本機資料）｜右側 = kanpan 分析</span>
</header>
<main>
  <div id="chart"></div>
  <aside id="panel"><div class="note">輸入代號按「看盤」</div></aside>
</main>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const API  = "http://127.0.0.1:8771/panel";
const OHLC = "http://127.0.0.1:8771/ohlc";
const POSAPI = "http://127.0.0.1:8771/position";

// ---- 自畫 K 線（lightweight-charts + 本機 /ohlc，不靠 TradingView，無彈窗）----
let chart, candleS, volS, ma20S, ma60S;

function sma(candles, n) {
  const out = [];
  let sum = 0;
  for (let i = 0; i < candles.length; i++) {
    sum += candles[i].close;
    if (i >= n) sum -= candles[i - n].close;
    if (i >= n - 1) out.push({ time: candles[i].time, value: +(sum / n).toFixed(2) });
  }
  return out;
}

function initChart() {
  const box = document.getElementById("chart");
  box.innerHTML = "";
  chart = LightweightCharts.createChart(box, {
    layout: { background: { color: "#0a0e1f" }, textColor: "#9aa6c4" },
    grid: { vertLines: { color: "#161c33" }, horzLines: { color: "#161c33" } },
    rightPriceScale: { borderColor: "#2a3a66" },
    timeScale: { borderColor: "#2a3a66", timeVisible: false },
    crosshair: { mode: 0 },
    autoSize: true,
  });
  candleS = chart.addCandlestickSeries({
    upColor: "#e2483a", downColor: "#26a69a",
    wickUpColor: "#e2483a", wickDownColor: "#26a69a",
    borderVisible: false,
  });
  ma20S = chart.addLineSeries({ color: "#f4b400", lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  ma60S = chart.addLineSeries({ color: "#2962ff", lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  volS = chart.addHistogramSeries({ priceFormat: { type: "volume" }, priceScaleId: "" });
  volS.priceScale().applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });
}

async function loadChart(sid) {
  if (!chart) initChart();
  let d;
  try {
    d = await (await fetch(`${OHLC}?sid=${sid}`)).json();
  } catch (e) { return; }
  if (d.error || !d.candles) return;
  candleS.setData(d.candles);
  volS.setData(d.volumes || []);
  ma20S.setData(sma(d.candles, 20));
  ma60S.setData(sma(d.candles, 60));
  chart.timeScale().fitContent();
}

// ---- kanpan 面板 ----
function scoreCls(v) { return v >= 70 ? "good" : v >= 50 ? "mid" : "weak"; }

function instRow(name, x) {
  const cls = x.net > 0 ? "buy" : x.net < 0 ? "sell" : "";
  let t = (x.net > 0 ? "+" : "") + x.net.toLocaleString() + " 張";
  if (x.streak > 1) t += `（連買${x.streak}日）`;
  else if (x.streak < -1) t += `（連賣${-x.streak}日）`;
  return `<div class="row"><span>${name}</span><span class="${cls}">${t}</span></div>`;
}

function posCard(pos) {
  if (!pos) return "";
  const cls = pos.light === "🟢" ? "g" : pos.light === "🟡" ? "y" : "r";
  const sh = pos.shares != null ? ` × ${pos.shares}張` : "";
  const uCls = pos.unreal_pct >= 0 ? "buy" : "sell";
  return `<div class="pos ${cls}">
    <div class="pos-h">持倉 ${pos.sid}　${pos.light} ${pos.state}</div>
    <div class="pos-m">進場 ${pos.entry_price}${sh}｜現價 <span class="pos-x">${pos.cur_price}</span>｜未實現 <span class="${uCls}">${pos.unreal_pct > 0 ? "+" : ""}${pos.unreal_pct}%</span></div>
    <div class="pos-m">生效出場：<span class="pos-x">${pos.effective_exit}</span>（${pos.effective_by}，硬停損${pos.hard_stop} / Trail高點${pos.peak_price}−8%=${pos.trail_stop}）</div>
    <div class="pos-m">距觸發 <span class="pos-x">${pos.dist_pct > 0 ? "+" : ""}${pos.dist_pct}%</span></div>
    <div class="pos-act"><button id="pos-close" data-sid="${pos.sid}" data-px="${pos.cur_price}">平倉（現價 ${pos.cur_price}）</button></div>
  </div>`;
}

function posForm(sid, curPrice) {
  return `<div class="pos">
    <div class="pos-h">建立持倉 ${sid}</div>
    <div class="pos-form">
      <input id="pos-entry" type="number" step="0.01" placeholder="進場價" value="${curPrice ?? ""}">
      <input id="pos-shares" type="number" step="0.001" placeholder="張數" value="1">
      <button id="pos-open" data-sid="${sid}">建倉</button>
    </div>
    <div class="note">建倉後此卡變風控卡，自動盯硬停損／Trail</div>
  </div>`;
}

async function posPost(body) {
  const r = await fetch(POSAPI, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}

function bindPos(sid) {
  const ob = document.getElementById("pos-open");
  if (ob) ob.onclick = async () => {
    const entry = parseFloat(document.getElementById("pos-entry").value);
    const shares = parseFloat(document.getElementById("pos-shares").value);
    if (!(entry > 0) || !(shares > 0)) { alert("進場價/張數要 > 0"); return; }
    ob.disabled = true; ob.textContent = "建倉中…";
    const res = await posPost({ action: "open", sid: ob.dataset.sid, entry_price: entry, shares });
    if (res.error) { alert(res.error); ob.disabled = false; ob.textContent = "建倉"; return; }
    loadPanel(sid);
  };
  const cb = document.getElementById("pos-close");
  if (cb) cb.onclick = async () => {
    if (!confirm(`平倉 ${cb.dataset.sid} @ ${cb.dataset.px}？`)) return;
    cb.disabled = true; cb.textContent = "平倉中…";
    const res = await posPost({ action: "close", sid: cb.dataset.sid, exit_price: parseFloat(cb.dataset.px) });
    if (res.error) { alert(res.error); cb.disabled = false; return; }
    loadPanel(sid);
  };
}

async function loadPanel(sid) {
  const el = document.getElementById("panel");
  el.innerHTML = `<div class="note">分析中…</div>`;
  let d;
  try {
    d = await (await fetch(`${API}?sid=${sid}`)).json();
  } catch (e) {
    el.innerHTML = `<div class="err">連不上本機後端</div>
      <div class="note">先跑：python api.py（kanpan 資料夾）</div>`;
    return;
  }
  if (d.error) { el.innerHTML = `<div class="err">${d.error}</div>`; return; }

  const live = d.live ? `<span class="live">● 即時 ${d.live_time}</span>`
                      : `<span class="static">收盤</span>`;
  const b = d.hist_bucket;
  const hist = (b && b.n > 0) ? `
    <div class="sec">歷史統計（分數 ${b.lo}~${b.hi} 的過去表現）</div>
    <div class="row"><span>樣本數</span><span>${b.n.toLocaleString()}</span></div>
    <div class="row"><span>5/10/20日勝率</span><span>${b.win5}% / ${b.win10}% / ${b.win20}%</span></div>
    <div class="row"><span>平均報酬(20日)</span><span>${b.avg20 > 0 ? "+" : ""}${b.avg20}%</span></div>
    <div class="row"><span>最大回撤</span><span class="weak">${b.mdd}%</span></div>
    <div class="note">${b.period}</div>`
    : `<div class="note">歷史統計未產生</div>`;
  const posTag = d.pos_pct == null ? "" :
    d.pos_pct >= 70 ? "（偏高）" : d.pos_pct <= 30 ? "（偏低）" : "（中段）";
  const ic = d.inst_consensus;
  const icCls = ic ? (ic.status === "一致偏多" ? "buy" : ic.status === "一致偏空" ? "sell" : "") : "";
  const inst = d.inst ? `
    <div class="kp-hr"></div>
    <div class="sec">法人買賣超（${d.inst.date}）</div>
    ${instRow("外資", d.inst.foreign)}
    ${instRow("投信", d.inst.trust)}
    ${instRow("自營", d.inst.dealer)}
    ${ic ? `<div class="row"><span>法人共識</span><span class="${icCls}">${ic.light} ${ic.status}（主導${ic.leader}${ic.neutral && ic.neutral.length ? "，" + ic.neutral.join("/") + "中性" : ""}）</span></div>` : ""}` : "";

  const fr = d.freshness, ifr = d.inst_fresh, cons = d.consistency;
  const consWarn = (cons && !cons.ok)
    ? cons.mismatch.map(s => `<div class="err">⚠ ${s.name} 資料停在 ${s.date}，與基準 ${cons.ref} 不一致</div>`).join("")
    : "";
  const freshWarn =
    (d.ref_date ? `<div class="note">資料基準 ${d.ref_date} 收盤（全欄位同一根 bar）</div>` : "") +
    ((fr && fr.stale) ? `<div class="err">⚠ 價格資料延遲 ${fr.lag} 日（最後 ${fr.last}）訊號僅供參考</div>` : "") +
    ((ifr && ifr.stale) ? `<div class="note" style="color:#e8a33d">⚠ 法人延遲 ${ifr.lag} 日（T86 約16:00公布，盤中本就落後）</div>` : "") +
    consWarn;

  const oh = d.overhead;
  const ohRow = oh ? `<div class="row"><span>上方套牢</span><span class="${oh.near ? "weak" : ""}">${oh.near ? "⚠️逼近 " : ""}${oh.nearest}（+${oh.dist_pct}%，量占${Math.round(oh.vol_share*100)}%）</span></div>` : "";
  const bo = d.breakout;
  const boRow = (bo && bo.state !== "none") ? `<div class="row"><span>突破帶量</span><span class="${bo.ok ? "buy" : ""}">${bo.ok ? "🟢" : "🟡"} ${bo.v}</span></div>` : "";

  const sl = d.state_layer;
  const ck = sl ? sl.checklist.map(x => `<span class="ck ${x.ok ? "on" : "off"}">${x.ok ? "☑" : "☒"} ${x.k}</span>`).join("") : "";
  const stateCard = sl ? `
    <div class="state">
      <div class="srow"><span>趨勢 <b>${sl.trend}</b></span><span>籌碼 <b>${sl.chips_light}${sl.chips}</b></span><span>動能 <b>${sl.momentum}</b></span></div>
      <div class="cks">${ck}</div>
    </div>` : "";

  const pb = d.playbook;
  let pbCard = "";
  if (pb) {
    const tagTxt = { ok: "✅可參考", no_edge: "🔴無 edge", overfit: "⚠過擬合", low_sample: "⚠樣本不足", unvalidated: "⚠未驗證" };
    const cards = (pb.cards || []).map(cd => {
      const st = cd.stat;
      const s2 = st ? `<div class="pbstat">訓練 ${st.n_train.toLocaleString()}筆 ${st.win_train}%　驗證 ${st.n_val.toLocaleString()}筆 ${st.win_val}%　均${st.avg20 > 0 ? "+" : ""}${st.avg20}% 最差${st.mdd}%</div>` : "";
      return `<div class="pb pb-${cd.status}"><div class="pbn">▸ ${cd.name} <span class="pbt">${tagTxt[cd.status] || cd.status}</span></div><div class="pbc">${cd.cond}</div>${s2}${cd.msg ? `<div class="pbm">${cd.msg}</div>` : ""}</div>`;
    }).join("");
    const nt = (pb.no_trade || []).map(r => `☑ ${r.label}`).join("　");
    pbCard = `<div class="sec">L2 規則化劇本（綁回測·防呆）</div>` +
      (cards || `<div class="note">今日無模板觸發</div>`) +
      (nt ? `<div class="note" style="color:#e8a33d">不交易原因：${nt}</div>` : "");
  }

  el.innerHTML = `
    ${d.position ? posCard(d.position) : posForm(d.sid, d.close)}
    <div><b style="font-size:15px">${d.sid}</b>　${live}</div>
    <div class="kp-hr"></div>
    <div class="kp-score ${scoreCls(d.vp_score)}">當前分數　<b>${d.vp_score}</b><span class="note"> /100</span></div>
    <div class="note">趨勢40%+動能20%+量能20%+位置20%</div>
    <div class="note">${d.date}　收盤/現價 ${d.close}</div>
    ${freshWarn}
    ${stateCard}
    ${pbCard}
    <div class="kp-hr"></div>
    ${hist}
    <div class="kp-hr"></div>
    <div class="row"><span>趨勢分數</span><span>${d.trend_score}/100（均線結構）</span></div>
    <div class="row"><span>結構</span><span><b>${d.structure}</b></span></div>
    <div class="row"><span>週線</span><span>${d.weekly ?? "—"}</span></div>
    <div class="row"><span>日週共振</span><span>${d.resonance ?? "—"}</span></div>
    <div class="row"><span>動能</span><span>RSI ${d.rsi ?? "—"}　${d.momentum}</span></div>
    <div class="row"><span>量能</span><span>${d.vol_ratio ?? "—"}倍 ${d.vol_tag}</span></div>
    <div class="row"><span>量堆積</span><span>${d.skew_tag ?? "—"}</span></div>
    <div class="row"><span>位置</span><span>60日區間 ${d.pos_pct ?? "—"}%${posTag}</span></div>
    ${d.vah ? `<div class="row"><span>參考價位</span><span>壓 ${d.vah}｜軸 ${d.poc}｜支 ${d.val}</span></div>` : ""}
    ${d.ccp != null ? `<div class="row"><span>收盤位置</span><span>${d.ccp}% ${d.ccp_tag}</span></div>` : ""}
    ${d.round_level ? `<div class="row"><span>整數關卡</span><span>${d.round_level}（${d.round_dist > 0 ? "+" : ""}${d.round_dist}% ${d.round_tag}）${d.round_cluster ? `<br><span class="note">叢集 ${d.round_cluster.join(" / ")}</span>` : ""}</span></div>` : ""}
    ${ohRow}
    ${boRow}
    ${d.poc_consist != null ? `<div class="row"><span>POC一致</span><span>動${d.dyn_poc}≈靜${d.poc} ${d.poc_tag}</span></div>` : ""}
    ${d.vol_note ? `<div class="note">${d.vol_note}</div>` : ""}
    ${inst}
    <div class="kp-hr"></div>
    <div class="sec">評語</div>
    <div class="comment">${(d.comment || "").replace(/\n/g, "<br>")}</div>`;
  bindPos(sid);
}

function go() {
  const sid = document.getElementById("sid").value.trim().toUpperCase();
  if (!/^[0-9]{4,6}[A-Z]?$/.test(sid)) { alert("代號格式：2330 / 0050"); return; }
  loadChart(sid);
  loadPanel(sid);
}
document.getElementById("go").onclick = go;
document.getElementById("sid").addEventListener("keydown", e => {
  if (e.key === "Enter") go();
});
go();   // 開頁先載預設 2330
</script>
</body>
</html>
